<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DashAV Fleet Manager</title>
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        body { background-color: #111827; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .animate-fadeIn { animation: fadeIn 0.2s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // DATABASE CONNECTION 
        // ==========================================
        const BIN_ID = '69e90dd9856a682189602831'; 
        const API_KEY = '$2a$10$ThfWfi42x/VYabTAC401w.lzVoKKOUWy2pMx7eyzLnH57fV32hy26'; 
        // ==========================================

        function App() {
            const [authState, setAuthState] = React.useState('passcode'); 
            const [passcode, setPasscode] = React.useState('');
            const [colorSelection, setColorSelection] = React.useState([]);

            const [systems, setSystems] = React.useState([]);
            const [isLoading, setIsLoading] = React.useState(false);
            const [activeVideo, setActiveVideo] = React.useState(null);
            const [editingSystem, setEditingSystem] = React.useState(null);

            // We need a ref to hold the current systems so the 30-second timer always knows what to check
            const systemsRef = React.useRef(systems);
            React.useEffect(() => {
                systemsRef.current = systems;
            }, [systems]);

            // ==========================================
            // TRUE APP STATUS CHECKER (IMAGE PING)
            // ==========================================
            // Added isBackground flag so the auto-checker doesn't flash yellow every 30 seconds
            const checkAllStatuses = async (systemList, isBackground = false) => {
                if (!isBackground) {
                    setSystems(systemList.map(s => ({...s, status: 'checking'})));
                }

                const checkedSystems = await Promise.all(systemList.map(sys => {
                    return new Promise((resolve) => {
                        let isResolved = false;
                        const img = new Image();

                        const finish = (status) => {
                            if (!isResolved) {
                                isResolved = true;
                                resolve({ ...sys, status: status });
                            }
                        };

                        img.onload = () => finish('online');
                        img.onerror = () => finish('offline');
                        setTimeout(() => finish('offline'), 3000);
                        img.src = `http://${sys.ip}:${sys.port}/favicon.ico?r=${Math.random()}`;
                    });
                }));

                setSystems(checkedSystems);
            };

            // ==========================================
            // AUTO-MONITORING (EVERY 30 SECONDS)
            // ==========================================
            React.useEffect(() => {
                let intervalId;
                if (authState === 'authenticated') {
                    // Set up a loop to ping systems every 30,000 milliseconds (30 sec)
                    intervalId = setInterval(() => {
                        if (systemsRef.current.length > 0) {
                            checkAllStatuses(systemsRef.current, true);
                        }
                    }, 30000); 
                }
                return () => clearInterval(intervalId); // Clean up timer if user logs out or closes
            }, [authState]);


            // ==========================================
            // CLOUD DATABASE FUNCTIONS (JSONBIN)
            // ==========================================
            const fetchFromCloud = async () => {
                setIsLoading(true);
                try {
                    const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                        headers: { 'X-Master-Key': API_KEY } 
                    });
                    
                    if (!response.ok) throw new Error(`HTTP Error ${response.status}`);
                    
                    const data = await response.json();
                    
                    let parsedSystems = [];
                    if (data.record && data.record.systems && Array.isArray(data.record.systems)) {
                        parsedSystems = data.record.systems;
                    } else if (data.record && Array.isArray(data.record)) {
                        parsedSystems = data.record;
                    }
                    
                    await checkAllStatuses(parsedSystems, false);
                    
                } catch (error) {
                    console.error(error);
                    alert(`Database Load Error: ${error.message}\n\nPlease double check your BIN_ID and API_KEY.`);
                }
                setIsLoading(false);
            };

            const saveToCloud = async (newSystems) => {
                checkAllStatuses(newSystems, false);
                const payloadToSave = { systems: newSystems };
                
                try {
                    await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Master-Key': API_KEY 
                        },
                        body: JSON.stringify(payloadToSave) 
                    });
                } catch (error) {
                    console.error(error);
                    alert(`Save Error: ${error.message}`);
                }
            };

            // ==========================================
            // OBFUSCATED SECURITY LOGIC
            // ==========================================
            const handlePasscodeSubmit = (e) => {
                e.preventDefault();
                if (btoa(passcode) === 'MTYxNQ==') { 
                    setAuthState('colors');
                } else { 
                    alert('Incorrect Passcode'); 
                    setPasscode(''); 
                }
            };

            const handleColorClick = (color) => {
                const newSelection = [...colorSelection, color];
                setColorSelection(newSelection);
                
                if (newSelection.length === 3) {
                    const stringifiedSequence = newSelection.join(',');
                    if (btoa(stringifiedSequence) === 'cmVkLGdyZWVuLGJsdWU=') {
                        if (window.location.protocol === 'https:') {
                            setAuthState('browser-setup'); 
                        } else {
                            setAuthState('authenticated');
                            fetchFromCloud();
                        }
                    } else {
                        alert('Security Breach. Access Denied.');
                        setColorSelection([]);
                        setAuthState('passcode');
                        setPasscode('');
                    }
                }
            };

            // CRUD OPERATIONS
            const handleAddSystem = () => { setEditingSystem({ id: Date.now(), name: "New System", ip: "127.0.0.1", port: "8000", network: "VPN", status: "checking", videoLink: "" }); };
            const handleSaveSystem = () => {
                let updatedSystems = !systems.find(s => s.id === editingSystem.id) ? [...systems, editingSystem] : systems.map(s => s.id === editingSystem.id ? editingSystem : s);
                setEditingSystem(null);
                saveToCloud(updatedSystems);
            };
            const handleDeleteSystem = (id) => {
                if (window.confirm("Permanently delete from database?")) {
                    saveToCloud(systems.filter(s => s.id !== id));
                    setEditingSystem(null);
                }
            };

            // UI RENDERS
            if (authState === 'passcode') {
                return (
                    <div className="min-h-screen flex items-center justify-center text-white">
                        <form onSubmit={handlePasscodeSubmit} className="bg-gray-800 p-8 rounded-xl shadow-2xl text-center border-t-4 border-indigo-500 w-full max-w-sm border-gray-700">
                            <i className="fas fa-lock text-5xl text-indigo-500 mb-4"></i>
                            <h2 className="text-3xl font-bold mb-4">Secure Access</h2>
                            <div className="mb-6">
                                <p className="text-gray-400 font-medium tracking-wide">Please enter your authorization PIN to securely access the fleet manager.</p>
                            </div>
                            <input type="password" value={passcode} onChange={e => setPasscode(e.target.value)} className="w-full text-center bg-gray-900 border border-gray-600 rounded-lg p-3 text-white tracking-widest text-2xl mb-4 focus:border-indigo-500 focus:outline-none shadow-inner" placeholder="****" autoFocus />
                            <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-500 py-3 rounded font-bold text-lg transition shadow-lg">Verify</button>
                        </form>
                    </div>
                );
            }

            if (authState === 'colors') {
                const colors = [
                    { id: 'yellow', hex: '#EAB308' }, { id: 'red', hex: '#EF4444' }, { id: 'purple', hex: '#A855F7' },
                    { id: 'green', hex: '#22C55E' }, { id: 'blue', hex: '#3B82F6' }, { id: 'orange', hex: '#F97316' }
                ];
                return (
                    <div className="min-h-screen flex items-center justify-center text-white">
                        <div className="bg-gray-800 p-8 rounded-xl shadow-2xl text-center border-t-4 border-indigo-500 w-full max-w-sm border-gray-700">
                            <i className="fas fa-fingerprint text-5xl text-indigo-500 mb-4"></i>
                            <h2 className="text-3xl font-bold mb-4">Sequence Verification</h2>
                            <div className="mb-6">
                                <p className="text-gray-400 font-medium mb-3">Please select the correct color sequence to authenticate your session.</p>
                            </div>
                            <div className="grid grid-cols-3 gap-3 mb-6">
                                {colors.map(c => (
                                    <button key={c.id} onClick={() => handleColorClick(c.id)} style={{ backgroundColor: c.hex }} className="h-16 w-full rounded shadow hover:opacity-80 active:scale-95 border border-black/20"></button>
                                ))}
                            </div>
                            <div className="flex gap-2 justify-center mt-2 bg-gray-900 p-2 rounded-lg inline-flex shadow-inner">
                                {[0, 1, 2].map(i => (
                                    <div key={i} className={`h-3 w-12 rounded-full transition-colors duration-300 ${colorSelection.length > i ? 'bg-indigo-500 shadow-[0_0_8px_rgba(99,102,241,0.8)]' : 'bg-gray-700'}`}></div>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            if (authState === 'browser-setup') {
                return (
                    <div className="min-h-screen flex items-center justify-center text-white p-4">
                        <div className="bg-gray-800 p-8 rounded-xl shadow-2xl border-t-4 border-yellow-500 w-full max-w-lg border-gray-700 animate-fadeIn">
                            <div className="text-center mb-6">
                                <i className="fas fa-shield-alt text-5xl text-yellow-500 mb-4"></i>
                                <h2 className="text-2xl font-bold">One-Time Browser Setup</h2>
                                <p className="text-gray-300 mt-2">Because this dashboard is hosted securely, your browser will block it from pinging your local Companion IPs. You must allow it manually.</p>
                            </div>
                            
                            <div className="bg-gray-900 p-4 rounded-lg mb-6 border border-gray-700">
                                <ol className="list-decimal list-inside text-gray-300 space-y-3 font-medium">
                                    <li>Click the <i className="fas fa-lock text-gray-400 mx-1"></i> <strong>Padlock</strong> or Settings icon next to the URL bar above.</li>
                                    <li>Click on <strong>Site settings</strong>.</li>
                                    <li>Scroll down to <strong>Insecure content</strong> or <strong>Mixed Content</strong>.</li>
                                    <li>Change the dropdown from <span className="text-red-400">Block</span> to <span className="text-green-400">Allow</span>.</li>
                                    <li>Return to this tab.</li>
                                </ol>
                            </div>
                            
                            <button 
                                onClick={() => {
                                    setAuthState('authenticated');
                                    fetchFromCloud();
                                }} 
                                className="w-full bg-green-600 hover:bg-green-500 py-4 rounded font-bold text-lg transition shadow-lg flex justify-center items-center gap-2"
                            >
                                <i className="fas fa-check-circle"></i> I Have Allowed Insecure Content
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen text-white p-8 font-sans">
                    <div className="max-w-7xl mx-auto relative">
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 border-b border-gray-700 pb-4 gap-4">
                            <h1 className="text-3xl font-bold flex items-center gap-3"><i className="fas fa-broadcast-tower text-indigo-500"></i> DashAV Fleet</h1>
                            <div className="flex gap-3">
                                <button onClick={handleAddSystem} disabled={isLoading} className="bg-green-600 hover:bg-green-700 px-5 py-2.5 rounded shadow font-semibold"><i className="fas fa-plus mr-2"></i> Add Unit</button>
                                <button onClick={fetchFromCloud} disabled={isLoading} className="bg-indigo-600 hover:bg-indigo-700 px-5 py-2.5 rounded shadow font-semibold"><i className={`fas fa-sync-alt mr-2 ${isLoading ? 'fa-spin' : ''}`}></i> {isLoading ? 'Syncing...' : 'Refresh Status'}</button>
                            </div>
                        </div>

                        {isLoading && systems.length === 0 ? (
                            <div className="text-center py-20 text-gray-400"><i className="fas fa-cloud text-5xl mb-4 animate-pulse"></i><p>Fetching from Cloud database...</p></div>
                        ) : systems.length === 0 ? (
                            <div className="text-center py-20 text-gray-500 border-2 border-dashed border-gray-700 rounded-xl"><i className="fas fa-server text-4xl mb-3"></i><p>No systems configured in database.</p><p className="text-sm mt-2">Click 'Add Unit' to begin tracking.</p></div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {systems.map((sys) => (
                                    <div key={sys.id} className="bg-gray-800 rounded-xl p-5 border-t-4 shadow-lg flex flex-col" style={{ borderColor: sys.status === 'online' ? '#10B981' : sys.status === 'offline' ? '#EF4444' : '#F59E0B' }}>
                                        <div className="flex justify-between items-start mb-4">
                                            <h2 className="text-xl font-bold truncate pr-3">{sys.name}</h2>
                                            <button onClick={() => setEditingSystem({...sys})} className="text-gray-400 hover:text-white"><i className="fas fa-cog text-lg transition transform hover:rotate-90"></i></button>
                                        </div>
                                        <div className="space-y-4 mb-6 flex-grow text-gray-300 text-sm">
                                            <div className="flex bg-gray-900/50 rounded-lg p-3 gap-4 border border-gray-700/50">
                                                <div className="flex-1 overflow-hidden">
                                                    <div className="text-xs text-gray-500 uppercase font-semibold mb-1"><i className="fas fa-network-wired w-4 text-center"></i> Routing</div>
                                                    <div className="font-medium text-blue-300 truncate">{sys.network || 'N/A'}</div>
                                                </div>
                                                <div className="border-l border-gray-700/50 pl-4 flex-1">
                                                    <div className="text-xs text-gray-500 uppercase font-semibold mb-1"><i className="fas fa-server w-4 text-center"></i> Endpoint</div>
                                                    <div className="font-mono text-[13px]">{sys.ip}:{sys.port}</div>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-2 mb-2">
                                            <a href={`http://${sys.ip}:${sys.port}`} target="_blank" className="flex items-center justify-center gap-2 py-2 px-3 rounded text-sm bg-gray-700 hover:bg-gray-600 transition text-white font-bold"><i className="fas fa-sliders-h"></i> Web GUI</a>
                                            <a href={`http://${sys.ip}:${sys.port}/emulator`} target="_blank" className="flex items-center justify-center gap-2 py-2 px-3 rounded text-sm bg-blue-600/20 hover:bg-blue-600/30 transition text-blue-300 border border-blue-600/30 font-bold"><i className="fas fa-mobile-alt"></i> Emulator</a>
                                        </div>
                                        <button onClick={() => setActiveVideo(sys)} className="w-full bg-purple-600 hover:bg-purple-500 text-white py-2.5 rounded font-bold text-sm transition shadow mt-1"><i className="fas fa-video mr-2"></i> Open Monitor</button>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Edit Modal */}
                    {editingSystem && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 animate-fadeIn">
                            <div className="bg-gray-800 rounded-xl shadow-2xl w-full max-w-md border border-gray-600 p-6">
                                <h3 className="font-bold text-xl text-white mb-5 border-b border-gray-700 pb-3"><i className="fas fa-edit text-indigo-400 mr-2"></i>{systems.find(s => s.id === editingSystem.id) ? 'Edit Configuration' : 'Add New Unit'}</h3>
                                <div className="space-y-4">
                                    <div><label className="block text-xs text-gray-400 font-bold mb-1">System Name</label><input type="text" className="w-full bg-gray-900 border border-gray-600 rounded p-2.5 text-white focus:outline-none focus:border-indigo-500" value={editingSystem.name} onChange={e => setEditingSystem({...editingSystem, name: e.target.value})} autoFocus /></div>
                                    <div><label className="block text-xs text-gray-400 font-bold mb-1">Network Route (Label)</label><input type="text" placeholder="e.g. Tailscale, Local" className="w-full bg-gray-900 border border-gray-600 rounded p-2.5 text-white focus:outline-none focus:border-indigo-500" value={editingSystem.network || ''} onChange={e => setEditingSystem({...editingSystem, network: e.target.value})} /></div>
                                    <div className="flex gap-4">
                                        <div className="flex-1"><label className="block text-xs text-gray-400 font-bold mb-1">IP Address</label><input type="text" className="w-full bg-gray-900 border border-gray-600 rounded p-2.5 text-white font-mono text-sm focus:outline-none focus:border-indigo-500" value={editingSystem.ip} onChange={e => setEditingSystem({...editingSystem, ip: e.target.value})} /></div>
                                        <div className="w-24"><label className="block text-xs text-gray-400 font-bold mb-1">Port</label><input type="text" className="w-full bg-gray-900 border border-gray-600 rounded p-2.5 text-white font-mono text-sm focus:outline-none focus:border-indigo-500" value={editingSystem.port} onChange={e => setEditingSystem({...editingSystem, port: e.target.value})} /></div>
                                    </div>
                                    <div><label className="block text-xs text-gray-400 font-bold mb-1">Video Feed URL (Embeddable)</label><input type="text" placeholder="https://vdo.ninja/..." className="w-full bg-gray-900 border border-gray-600 rounded p-2.5 text-white font-mono text-sm focus:outline-none focus:border-indigo-500" value={editingSystem.videoLink} onChange={e => setEditingSystem({...editingSystem, videoLink: e.target.value})} /></div>
                                </div>
                                <div className="mt-8 flex justify-between items-center">
                                    {systems.find(s => s.id === editingSystem.id) ? <button onClick={() => handleDeleteSystem(editingSystem.id)} className="text-red-500 hover:text-red-400 font-semibold px-2 py-1 flex items-center transition bg-red-900/20 rounded hover:bg-red-900/40"><i className="fas fa-trash-alt mr-2"></i> Delete</button> : <div></div>}
                                    <div className="flex gap-3">
                                        <button onClick={() => setEditingSystem(null)} className="text-gray-400 hover:text-white font-semibold px-3 py-2 transition">Cancel</button>
                                        <button onClick={handleSaveSystem} className="px-5 py-2 bg-indigo-600 hover:bg-indigo-500 text-white rounded font-bold transition flex items-center shadow"><i className="fas fa-cloud-upload-alt mr-2"></i> Save</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Video Modal */}
                    {activeVideo && (
                        <div className="fixed inset-0 bg-black flex items-center justify-center z-50 animate-fadeIn">
                            <div className="w-full h-full relative">
                                <div className="absolute top-0 left-0 w-full p-4 bg-gradient-to-b from-black/80 to-transparent flex justify-between items-center z-50 pointer-events-none">
                                    <h2 className="text-white font-bold text-xl drop-shadow-md ml-2">{activeVideo.name} Monitor</h2>
                                    <button onClick={() => setActiveVideo(null)} className="pointer-events-auto bg-gray-800 text-white rounded-full h-12 w-12 flex items-center justify-center hover:bg-red-600 transition shadow-lg border border-gray-600 hover:border-red-500 mr-2"><i className="fas fa-times text-xl"></i></button>
                                </div>
                                {activeVideo.videoLink ? <iframe src={activeVideo.videoLink} className="w-full h-full border-0" allow="autoplay; camera; microphone; fullscreen"></iframe> : <div className="flex flex-col h-full items-center justify-center text-gray-500"><i className="fas fa-video-slash text-6xl mb-4"></i><p className="text-xl">No stream URL configured.</p></div>}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
