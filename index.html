<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Companion Fleet Manager</title>
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>body { background-color: #111827; }</style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // ADD YOUR GITHUB DETAILS HERE
        // ==========================================
        const GITHUB_USERNAME = 'YOUR_USERNAME_HERE'; 
        const GITHUB_REPO = 'fleet-tracker';
        const FILE_PATH = 'data.json';
        // ==========================================

        function App() {
            const [authState, setAuthState] = React.useState('passcode'); 
            const [passcode, setPasscode] = React.useState('');
            const [colorSelection, setColorSelection] = React.useState([]);
            const [ghToken, setGhToken] = React.useState(localStorage.getItem('ghToken') || '');
            
            const [systems, setSystems] = React.useState([]);
            const [fileSha, setFileSha] = React.useState('');
            const [isLoading, setIsLoading] = React.useState(false);
            const [activeVideo, setActiveVideo] = React.useState(null);
            const [editingSystem, setEditingSystem] = React.useState(null);

            // GITHUB API FUNCTIONS
            const fetchFromGitHub = async () => {
                setIsLoading(true);
                try {
                    const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${FILE_PATH}`, {
                        headers: { 'Authorization': `Bearer ${ghToken}`, 'Accept': 'application/vnd.github.v3+json' }
                    });
                    if (!response.ok) throw new Error('Check Token or Repo Settings');
                    
                    const data = await response.json();
                    setFileSha(data.sha); // We need the SHA to update the file later
                    
                    // GitHub returns Base64 encoded content
                    const decodedContent = atob(data.content);
                    const parsedSystems = JSON.parse(decodedContent);
                    
                    const loadedSystems = parsedSystems.map(s => ({...s, status: 'checking'}));
                    setSystems(loadedSystems);
                    
                    setTimeout(() => {
                        setSystems(prev => prev.map(s => ({ ...s, status: 'online' }))); // simplified ping
                    }, 1000);
                } catch (error) {
                    alert('Error connecting to GitHub: ' + error.message);
                    setAuthState('tokenInput'); // Force re-entry of token if it fails
                }
                setIsLoading(false);
            };

            const saveToGitHub = async (newSystems) => {
                setSystems(newSystems);
                try {
                    const encodedContent = btoa(JSON.stringify(newSystems, null, 2));
                    
                    const response = await fetch(`https://api.github.com/repos/${GITHUB_USERNAME}/${GITHUB_REPO}/contents/${FILE_PATH}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bearer ${ghToken}`,
                            'Accept': 'application/vnd.github.v3+json',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: "Update fleet systems via Dashboard",
                            content: encodedContent,
                            sha: fileSha // Must provide current SHA to overwrite
                        })
                    });
                    
                    const data = await response.json();
                    setFileSha(data.content.sha); // Update to new SHA
                } catch (error) {
                    alert("Failed to save to GitHub.");
                }
            };

            // AUTHENTICATION LOGIC
            const handlePasscodeSubmit = (e) => {
                e.preventDefault();
                if (passcode === '1615') setAuthState('colors');
                else { alert('Incorrect Passcode'); setPasscode(''); }
            };

            const handleColorClick = (color) => {
                const newSelection = [...colorSelection, color];
                setColorSelection(newSelection);
                
                if (newSelection.length === 3) {
                    if (newSelection[0] === 'red' && newSelection[1] === 'green' && newSelection[2] === 'blue') {
                        if (ghToken) {
                            setAuthState('authenticated');
                            fetchFromGitHub();
                        } else {
                            setAuthState('tokenInput');
                        }
                    } else {
                        alert('Security Breach. Access Denied.');
                        setColorSelection([]); setAuthState('passcode'); setPasscode('');
                    }
                }
            };

            const handleTokenSubmit = (e) => {
                e.preventDefault();
                localStorage.setItem('ghToken', ghToken);
                setAuthState('authenticated');
                fetchFromGitHub();
            };

            // CRUD OPERATIONS
            const handleAddSystem = () => setEditingSystem({ id: Date.now(), name: "New System", ip: "127.0.0.1", port: "8000", network: "VPN", status: "checking", videoLink: "" });
            
            const handleSaveSystem = () => {
                const updatedSystems = systems.find(s => s.id === editingSystem.id) 
                    ? systems.map(s => s.id === editingSystem.id ? editingSystem : s)
                    : [...systems, editingSystem];
                setEditingSystem(null);
                saveToGitHub(updatedSystems);
            };

            const handleDeleteSystem = (id) => {
                if (window.confirm("Delete this system directly from GitHub?")) {
                    saveToGitHub(systems.filter(s => s.id !== id));
                    setEditingSystem(null);
                }
            };

            // RENDER LOGIC
            if (authState === 'passcode') return (<div className="min-h-screen flex items-center justify-center"><form onSubmit={handlePasscodeSubmit} className="bg-gray-800 p-8 rounded-xl"><input type="password" value={passcode} onChange={e=>setPasscode(e.target.value)} className="text-center rounded p-2" autoFocus/></form></div>);
            
            if (authState === 'colors') return (<div className="min-h-screen flex items-center justify-center"><div className="bg-gray-800 p-8 rounded-xl grid grid-cols-3 gap-2">{[{id:'yellow',hex:'#EAB308'},{id:'red',hex:'#EF4444'},{id:'purple',hex:'#A855F7'},{id:'green',hex:'#22C55E'},{id:'blue',hex:'#3B82F6'},{id:'orange',hex:'#F97316'}].map(c => <button key={c.id} onClick={() => handleColorClick(c.id)} style={{backgroundColor: c.hex}} className="h-16 w-16 rounded"></button>)}</div></div>);

            if (authState === 'tokenInput') return (
                <div className="min-h-screen flex items-center justify-center text-white">
                    <form onSubmit={handleTokenSubmit} className="bg-gray-800 p-8 rounded-xl shadow-2xl max-w-md text-center">
                        <h2 className="text-xl font-bold mb-4">First-Time Setup</h2>
                        <p className="text-sm text-gray-400 mb-4">Enter your GitHub Fine-Grained Token. This stays locally on this device.</p>
                        <input type="password" value={ghToken} onChange={e => setGhToken(e.target.value)} className="w-full bg-gray-900 border border-gray-600 rounded p-2 text-white mb-4" placeholder="github_pat_..." required />
                        <button type="submit" className="w-full bg-indigo-600 py-2 rounded font-bold">Connect to GitHub</button>
                    </form>
                </div>
            );

            // MAIN DASHBOARD
            return (
                <div className="min-h-screen text-white p-8 font-sans">
                    <div className="max-w-7xl mx-auto">
                        <div className="flex justify-between items-center mb-8 border-b border-gray-700 pb-4">
                            <h1 className="text-3xl font-bold"><i className="fas fa-satellite-dish text-indigo-500"></i> Fleet Manager</h1>
                            <div className="flex gap-3">
                                <button onClick={handleAddSystem} className="bg-green-600 px-4 py-2 rounded text-white font-bold"><i className="fas fa-plus"></i></button>
                                <button onClick={fetchFromGitHub} className="bg-indigo-600 px-4 py-2 rounded text-white font-bold"><i className={`fas fa-sync ${isLoading ? 'fa-spin' : ''}`}></i></button>
                            </div>
                        </div>

                        {isLoading && systems.length === 0 ? <p className="text-center text-gray-400 mt-20">Loading from GitHub Repository...</p> : (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {systems.map(sys => (
                                    <div key={sys.id} className="bg-gray-800 p-5 rounded-xl border-t-4 shadow flex flex-col" style={{ borderColor: sys.status === 'online' ? '#10B981' : '#EF4444' }}>
                                        <div className="flex justify-between mb-4">
                                            <h2 className="text-xl font-bold">{sys.name}</h2>
                                            <button onClick={() => setEditingSystem({...sys})}><i className="fas fa-cog text-gray-400"></i></button>
                                        </div>
                                        <div className="font-mono text-sm text-gray-300 mb-4">{sys.ip}:{sys.port}</div>
                                        <div className="grid grid-cols-2 gap-2 mt-auto">
                                            <a href={`http://${sys.ip}:${sys.port}`} target="_blank" className="bg-gray-700 text-center py-2 rounded font-bold">GUI</a>
                                            <button onClick={() => setActiveVideo(sys)} className="bg-purple-600 py-2 rounded font-bold">Monitor</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Editor Modal */}
                     {editingSystem && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-gray-800 rounded-xl shadow-2xl w-full max-w-md border border-gray-600 p-5 text-white">
                                <h3 className="font-bold text-lg mb-4">System Info (Updates GitHub Directly)</h3>
                                <div className="space-y-4">
                                    <input type="text" className="w-full bg-gray-900 border border-gray-600 rounded p-2 placeholder-gray-500" placeholder="Name" value={editingSystem.name} onChange={e => setEditingSystem({...editingSystem, name: e.target.value})} />
                                    <input type="text" className="w-full bg-gray-900 border border-gray-600 rounded p-2 placeholder-gray-500" placeholder="IP Address" value={editingSystem.ip} onChange={e => setEditingSystem({...editingSystem, ip: e.target.value})} />
                                    <input type="text" className="w-full bg-gray-900 border border-gray-600 rounded p-2 placeholder-gray-500" placeholder="Port" value={editingSystem.port} onChange={e => setEditingSystem({...editingSystem, port: e.target.value})} />
                                    <input type="text" className="w-full bg-gray-900 border border-gray-600 rounded p-2 placeholder-gray-500" placeholder="VDO.ninja Link" value={editingSystem.videoLink} onChange={e => setEditingSystem({...editingSystem, videoLink: e.target.value})} />
                                </div>
                                <div className="mt-6 flex justify-between">
                                    <button onClick={() => handleDeleteSystem(editingSystem.id)} className="text-red-500 font-bold"><i className="fas fa-trash"></i></button>
                                    <div className="flex gap-3">
                                        <button onClick={() => setEditingSystem(null)} className="text-gray-400">Cancel</button>
                                        <button onClick={handleSaveSystem} className="bg-indigo-600 px-4 py-2 rounded font-bold">Save Commit</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Video Modal */}
                    {activeVideo && (
                        <div className="fixed inset-0 bg-black/95 flex items-center justify-center z-50">
                            <div className="w-full h-full relative">
                                <button onClick={() => setActiveVideo(null)} className="absolute top-4 right-4 bg-gray-800 text-white rounded-full h-10 w-10 z-50 flex items-center justify-center hover:bg-red-600"><i className="fas fa-times"></i></button>
                                <iframe src={activeVideo.videoLink} className="w-full h-full border-0" allow="autoplay; camera; microphone; fullscreen"></iframe>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
